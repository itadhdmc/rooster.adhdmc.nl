name: Build & Deploy naar Cloud86

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Installeer dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build productie
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ALLOWED_DOMAIN: adhdmc.nl

      # De FTP-server van Cloud86 geeft af en toe timeouts; daarom drie
      # pogingen met een ruime timeout voordat de workflow echt faalt.
      - name: Deploy naar Cloud86 via FTP (poging 1)
        id: deploy1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_PATH }}
          dangerous-clean-slate: false
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Wacht 90s voor nieuwe poging
        if: steps.deploy1.outcome == 'failure'
        run: sleep 90

      - name: Deploy naar Cloud86 via FTP (poging 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_PATH }}
          dangerous-clean-slate: false
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Wacht 180s voor laatste poging
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 180

      - name: Deploy naar Cloud86 via FTP (poging 3)
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_PATH }}
          dangerous-clean-slate: false
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
